name: Hacker News Daily Digest

on:
  workflow_dispatch:
    inputs:
      target_date:
        description: "Optional Tokyo date (YYYY-MM-DD); blank means yesterday"
        required: false
        type: string
      send_email:
        description: "Send the email after generation"
        required: true
        default: false
        type: boolean

  schedule:
    - cron: "7 8 * * *"
      timezone: "Asia/Tokyo"

permissions:
  contents: read

concurrency:
  group: hacker-news-daily-digest
  cancel-in-progress: false

jobs:
  build-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install --upgrade pip -r requirements.txt

      - name: Collect Hacker News data
        env:
          TARGET_DATE: ${{ inputs.target_date }}
        run: |
          if [ -n "$TARGET_DATE" ]; then
            python hn_digest.py --date "$TARGET_DATE" --output-dir output
          else
            python hn_digest.py --output-dir output
          fi

      - name: Generate Chinese digest
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          DASHSCOPE_BASE_URL: ${{ secrets.DASHSCOPE_BASE_URL }}
          DASHSCOPE_MODEL: ${{ secrets.DASHSCOPE_MODEL }}
        run: python generate_digest.py

      - name: Send email
        if: ${{ github.event_name == 'schedule' || inputs.send_email == true }}
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: python send_email.py

      - name: Upload generated files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hn-digest-output-${{ github.run_number }}
          path: output/
          if-no-files-found: ignore
          retention-days: 14
